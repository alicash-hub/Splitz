name: Supabase connection check

# Manual-only: run this from the Actions tab (or it can be triggered for you).
# It reads your project URL + anon key from repository secrets and verifies the
# app can reach Supabase. The anon key is publishable (RLS-gated) and is never
# printed by the script; GitHub also masks secret values in logs.
on:
  workflow_dispatch:
  # Also run on push to this feature branch — workflow_dispatch only works once
  # the workflow is on the default branch, which it isn't yet.
  push:
    branches:
      - claude/create-claude-md-ellsz9
    paths:
      - .github/workflows/supabase-check.yml
      - scripts/check-connection.mjs
      - package-lock.json

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Check Supabase connection
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: node scripts/check-connection.mjs
